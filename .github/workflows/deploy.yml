name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.PROJECT_DIR }}"

            echo "🔄 Pull latest code..."
            git config core.fileMode false
            for i in 1 2 3; do
              git fetch origin main && break
              echo "Retry $i/3..."
              sleep 5
            done
            git reset --hard origin/main

            echo "📦 Backup database..."
            ./scripts/backup.sh

            echo "🚀 Deploy..."
            docker compose pull
            docker compose up -d --build --remove-orphans

            echo "🔍 Health check..."
            ./scripts/healthcheck.sh

            echo "🧹 Cleanup old images..."
            docker image prune -f

      - name: Notify Telegram — Success
        if: success()
        run: |
          MSG=$(printf "✅ ${{ github.event.repository.name }} deployed\nCommit: $(echo ${{ github.sha }} | cut -c1-7)\nBy: ${{ github.actor }}")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TG_CHAT_ID }}" \
            --data-urlencode "text=${MSG}"

      - name: Notify Telegram — Failure
        if: failure()
        run: |
          MSG=$(printf "❌ ${{ github.event.repository.name }} DEPLOY FAILED\nCommit: $(echo ${{ github.sha }} | cut -c1-7)\nBy: ${{ github.actor }}\nLogs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TG_CHAT_ID }}" \
            --data-urlencode "text=${MSG}"
