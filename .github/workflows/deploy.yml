name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.PROJECT_DIR }}

            echo "🔄 Pull latest code..."
            git pull origin main

            echo "📦 Backup database..."
            ./scripts/backup.sh

            echo "🚀 Deploy..."
            docker compose pull
            docker compose up -d --build --remove-orphans

            echo "🔍 Health check..."
            ./scripts/healthcheck.sh

            echo "🧹 Cleanup old images..."
            docker image prune -f

      - name: Notify Telegram — Success
        if: success()
        run: |
          TEXT="✅ *${{ github.event.repository.name }}* deployed%0A"
          TEXT+="Branch: \`main\`%0A"
          TEXT+="Commit: \`$(echo ${{ github.sha }} | cut -c1-7)\`%0A"
          TEXT+="By: ${{ github.actor }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "parse_mode=Markdown" > /dev/null

      - name: Notify Telegram — Failure
        if: failure()
        run: |
          TEXT="❌ *${{ github.event.repository.name }}* DEPLOY FAILED%0A"
          TEXT+="Commit: \`$(echo ${{ github.sha }} | cut -c1-7)\`%0A"
          TEXT+="By: ${{ github.actor }}%0A"
          TEXT+="👉 [View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TG_CHAT_ID }}" \
            -d "text=${TEXT}" \
            -d "parse_mode=Markdown" > /dev/null
